<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Charlotte Decision Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="vendor/leaflet.css">
<style>
:root{
  --blue:#1f6feb; --silver:#6b7280; --gold:#b08a2e; --red:#b3203a; --maroon:#8b1e3f;
  --ink:#16202e; --ink2:#3a4658; --mut:#6b7686; --line:#e3e8f0; --line2:#eef2f7;
  --bg:#f4f6fa; --panel:#ffffff; --panel2:#f9fbfd; --accent:#1f6feb;
  --good:#127a4b; --goodbg:#e7f6ee; --warn:#9a5b00; --warnbg:#fff3df; --bad:#a01f3c;
  --shadow:0 1px 2px rgba(18,32,46,.06),0 6px 18px rgba(18,32,46,.06);
  --radius:12px; --rail:262px; --tray:330px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{margin:0 0 .4em;line-height:1.2;font-weight:650;letter-spacing:-.01em}
h2{font-size:22px} h3{font-size:16px} h4{font-size:14px}
p{margin:0 0 .7em} a{color:var(--blue)}
button{font-family:inherit}
.mut{color:var(--mut)} .small{font-size:13px} .tiny{font-size:12px}
code{background:var(--line2);padding:1px 5px;border-radius:5px;font-size:12px}

/* ---------- top bar ---------- */
#top{position:sticky;top:0;z-index:1200;display:flex;align-items:center;gap:14px;
  height:56px;padding:0 16px;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(18,32,46,.03)}
#brand{display:flex;align-items:center;gap:10px;font-weight:750;letter-spacing:-.02em;font-size:16px}
#brand .mark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--maroon));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
#brand small{font-weight:500;color:var(--mut);font-size:12px;letter-spacing:0}
#top .spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;
  border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink2);transition:.15s}
.pill:hover{border-color:#c8d2e0;background:var(--panel2)}
.pill b{color:var(--ink)}
.pill .dot{width:8px;height:8px;border-radius:50%;background:var(--good)}
.pill.warn{color:var(--warn)} .pill.warn .dot{background:var(--warn)}
#saveState{font-size:11px;color:var(--mut)}

/* ---------- layout ---------- */
#shell{display:flex;min-height:calc(100vh - 56px)}
#rail{width:var(--rail);flex:none;background:#fff;border-right:1px solid var(--line);
  padding:14px 12px;position:sticky;top:56px;height:calc(100vh - 56px);overflow:auto}
#main{flex:1;min-width:0;padding:24px 32px 80px;max-width:none}
#tray{width:var(--tray);max-width:88vw;background:#fff;border-left:1px solid var(--line);
  position:fixed;right:0;top:56px;height:calc(100vh - 56px);overflow:auto;z-index:1400;
  transform:translateX(100%);transition:transform .22s ease;box-shadow:-14px 0 34px rgba(18,32,46,.14)}
#tray.open{transform:translateX(0)}
#trayBack{position:fixed;inset:56px 0 0 0;background:rgba(18,32,46,.18);z-index:1350;opacity:0;pointer-events:none;transition:opacity .22s}
#trayBack.show{opacity:1;pointer-events:auto}

/* ---------- rail nav ---------- */
.navgrp{margin-bottom:14px}
.navgrp .lbl{font-size:11px;font-weight:750;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);padding:0 8px 6px}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;
  color:var(--ink2);font-weight:550;font-size:14px;transition:.12s;position:relative}
.navitem:hover{background:var(--panel2)}
.navitem.active{background:#eaf1fe;color:var(--blue);font-weight:650}
.navitem.active .ic{color:var(--blue)}
.navitem .ic{width:20px;display:flex;align-items:center;justify-content:center;color:var(--mut)}
.navitem .ic svg{width:18px;height:18px;display:block}
#brand .mark svg{width:17px;height:17px}
.navitem .ck{margin-left:auto;font-size:11px;color:var(--good)}
.navitem .badge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:1px 7px}
.railnote{font-size:11px;color:var(--mut);padding:6px 10px;line-height:1.45}

/* ---------- cards / generic ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
.card.tight{padding:14px 16px}
.kick{font-size:11px;font-weight:750;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.lede{font-size:15px;color:var(--ink2);line-height:1.55}
.hl{background:linear-gradient(transparent 62%,#fff0a8 62%)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}
.row{display:flex;gap:12px 14px;flex-wrap:wrap;align-items:flex-end}
.spread{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}

/* stat tiles */
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;flex:1;min-width:120px}
.stat .big{font-size:24px;font-weight:750;letter-spacing:-.02em;line-height:1.05}
.stat .lab{font-size:12px;color:var(--mut);margin-top:3px}
.stat.blue{border-left:3px solid var(--blue)} .stat.red{border-left:3px solid var(--red)}
.stat.gold{border-left:3px solid var(--gold)} .stat.silver{border-left:3px solid var(--silver)}

/* controls */
label.fld{display:inline-flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;color:var(--mut)}
select,input[type=text],input[type=number]{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);
  border-radius:8px;background:#fff;color:var(--ink);min-width:120px;font-size:13px}
select:focus,input:focus{outline:2px solid #bcd3fb;border-color:var(--blue)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--blue);color:#fff;border:1px solid var(--blue);
  padding:8px 15px;border-radius:9px;font-weight:650;font-size:13px;cursor:pointer;transition:.12s}
.btn:hover{filter:brightness(1.06)} .btn:disabled{opacity:.45;cursor:not-allowed}
.btn.ghost{background:#fff;color:var(--ink2);border-color:var(--line)}
.btn.ghost:hover{background:var(--panel2);filter:none}
.btn.sec{background:var(--panel2);color:var(--ink);border-color:var(--line)}
.btn.sm{padding:5px 11px;font-size:12px}
.btn.red{background:var(--red);border-color:var(--red)}
.clip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);color:var(--ink2);
  padding:5px 11px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:.12s}
.clip:hover{background:var(--panel2);border-color:#c8d2e0}
.clip.done{background:var(--goodbg);border-color:#b6e3cb;color:#0c5b38}

/* chips / toggles */
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:5px 12px;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;transition:.12s}
.chip:hover{border-color:#c8d2e0}
.chip.on{background:#eaf1fe;border-color:#9fc0fb;color:var(--blue)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}

/* boxes */
.note{font-size:13px;color:var(--ink2);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-top:8px}
.okbox{background:var(--goodbg);border:1px solid #b6e3cb;color:#0c5b38;border-radius:9px;padding:10px 13px;font-size:13px;margin:8px 0}
.warnbox{background:var(--warnbg);border:1px solid #f0d9a8;color:#7a4a00;border-radius:9px;padding:10px 13px;font-size:13px;margin:8px 0}
.leakbox{background:#fdeef2;border:1px solid #f3c2cf;color:#8a1733;border-radius:9px;padding:10px 13px;font-size:13px;margin:8px 0}
.infobox{background:#eef4ff;border:1px solid #cfe0fb;color:#1a4ba0;border-radius:9px;padding:10px 13px;font-size:13px;margin:8px 0}

/* tables */
table.t{border-collapse:collapse;width:100%;font-size:13px}
table.t th,table.t td{padding:6px 9px;border-bottom:1px solid var(--line2);text-align:left}
table.t th{position:sticky;top:0;background:var(--panel2);font-weight:650;color:var(--ink2);cursor:pointer;white-space:nowrap}
table.t tbody tr:hover{background:#f6f9fe}
.scrollx{overflow:auto;max-height:520px;border:1px solid var(--line);border-radius:10px}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px}
.tag.leak{background:#fdeef2;color:#a01f3c} .tag.npa{background:#eaf1fe;color:var(--blue)}
.tag.biz{background:#fff3df;color:#9a5b00} .tag.derived{background:#eef2f7;color:var(--mut)}

/* canvas / map */
.mapbox{height:460px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.chartwrap{position:relative;height:340px}
.leaflet-popup-content{font-family:inherit;font-size:12px}
.legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mut);margin-top:8px;flex-wrap:wrap}
.grad{height:11px;width:170px;border-radius:6px;background:linear-gradient(90deg,#edf5e9,#5fb38a,#0b473c)}

/* progress / meters */
.meter{height:8px;background:var(--line2);border-radius:6px;overflow:hidden}
.meter>i{display:block;height:100%;background:var(--blue);border-radius:6px;transition:width .3s}
.bars{display:flex;flex-direction:column;gap:5px}
.barrow{display:grid;grid-template-columns:minmax(110px,165px) 1fr auto;gap:10px;align-items:center;font-size:12px}
.barrow .num{text-align:right;min-width:42px;color:var(--ink2)}
.coefrow{display:grid;grid-template-columns:minmax(130px,180px) 1fr minmax(140px,180px);gap:12px;align-items:center;font-size:12px;padding:3px 0}
.coefbar{position:relative;height:18px;background:var(--line2);border-radius:5px}
.coefbar .zero{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#c4ccd8}
.coefbar .fill{position:absolute;top:2px;bottom:2px;border-radius:4px}
.coefval{font-size:12px}
.diglegend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:8px}
.legitem{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2)}
.legitem i{width:10px;height:10px;border-radius:3px;display:inline-block}
.corrt td,.corrt th{text-align:center;padding:5px 7px;border:1px solid #fff}
.corrt .corrrow{text-align:left;white-space:nowrap;font-weight:600;background:var(--panel2);position:sticky;left:0}
.corrt .corrnum{background:var(--panel2)}
.corrcell{cursor:pointer;font-variant-numeric:tabular-nums;font-size:11px;min-width:38px}
.corrcell:hover{outline:2px solid var(--ink)}
.barrow .bar{height:14px;background:var(--blue);border-radius:4px;min-width:2px}

/* evidence tray */
#tray .trayhead{position:sticky;top:0;background:#fff;padding:14px 16px 10px;border-bottom:1px solid var(--line);z-index:2}
#tray .trayhead h3{margin:0;display:flex;align-items:center;gap:8px}
#tray .traybody{padding:12px 14px}
.pin{position:relative;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--blue);
  border-radius:9px;padding:10px 12px 10px;margin-bottom:9px;font-size:12px;cursor:grab}
.pin .src{color:var(--mut);font-size:11px;margin-top:5px;font-weight:600}
.pin .x{position:absolute;top:6px;right:7px;border:none;background:none;color:var(--mut);cursor:pointer;font-size:13px}
.pin .x:hover{color:var(--bad)}
.pin.dragging{opacity:.5}

/* missions */
.mcard{border:1px solid var(--line);border-radius:11px;padding:0;overflow:hidden;background:#fff;margin-bottom:12px;box-shadow:var(--shadow)}
.mcard .mhead{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;cursor:pointer}
.mcard .mnum{width:30px;height:30px;flex:none;border-radius:8px;background:#eaf1fe;color:var(--blue);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
.mcard.done .mnum{background:var(--goodbg);color:var(--good)}
.mcard .mtitle{font-weight:650;font-size:15px}
.mcard .mmeta{font-size:11px;color:var(--mut);margin-top:2px}
.mcard .mbody{padding:0 16px 16px;border-top:1px solid var(--line2);display:none}
.mcard.open .mbody{display:block}
.mcard .step{display:flex;gap:9px;margin:9px 0;font-size:13px}
.mcard .step .sn{flex:none;width:20px;height:20px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mut)}
textarea{font-family:inherit;width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:13px;resize:vertical;min-height:70px}
textarea:focus{outline:2px solid #bcd3fb;border-color:var(--blue)}

/* argument board */
.slot{border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:13px;background:#fff}
.slot.over{border-color:var(--blue);background:#f3f8ff}
.slot h4{display:flex;align-items:center;gap:8px;margin:0 0 4px}
.slot .pillct{font-size:11px;font-weight:700;border-radius:999px;padding:1px 8px;background:var(--line2);color:var(--mut)}
.slot .dropzone{min-height:30px;border:1px dashed var(--line);border-radius:8px;padding:6px;margin-top:8px;font-size:11px;color:var(--mut)}
.slot .ev{background:#f7f2ff;border:1px solid #e2d4f5;border-radius:7px;padding:6px 9px;margin:4px 0;font-size:12px;position:relative}
.slot .ev .x{position:absolute;right:5px;top:4px;cursor:pointer;color:var(--mut);border:none;background:none}

/* modal */
#modal{position:fixed;inset:0;background:rgba(18,32,46,.45);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
#modal.hidden{display:none}
#modal .box{background:#fff;border-radius:14px;max-width:680px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
#modal .mh{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
#modal .mh h3{margin:0} #modal .mb{padding:18px 20px}
#modal .x{border:none;background:none;font-size:20px;cursor:pointer;color:var(--mut)}
.hidden{display:none}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;
  z-index:3000;transition:.25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="top">
  <div id="brand"><span class="mark"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="5.2" r="1.5" fill="#fff"/><circle cx="10" cy="14.8" r="1.5" fill="#fff"/><path d="M10 6.7v6.6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></span>
    <span>Charlotte Decision Challenge</span>
  </div>
  <div class="spacer"></div>
  <div class="pill" id="evPill" style="display:none" onclick="toggleTray()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M6 4.5h8v11l-4-3-4 3z"/></svg>Evidence <b id="evCount">0</b></div>
  <span id="saveState">saved</span>
</div>

<div id="shell">
  <nav id="rail"></nav>
  <main id="main"></main>
</div>
<div id="trayBack" style="display:none" onclick="toggleTray()"></div>
<aside id="tray" style="display:none">
  <div class="trayhead">
    <div class="spread"><h3 style="margin:0">Evidence <span class="pillct" id="trayN" style="font-size:11px;font-weight:700;background:var(--line2);color:var(--mut);border-radius:999px;padding:1px 8px">0</span></h3>
      <button class="btn ghost sm" onclick="toggleTray()">Close</button></div>
    <div class="small mut" style="margin-top:4px">Clip findings from any tool. They feed your case.</div>
  </div>
  <div class="traybody">
    <div id="pinlist"></div>
    <button class="btn ghost sm" style="width:100%;margin-top:6px" onclick="go('argument');toggleTray()">Build the argument</button>
  </div>
</aside>

<div id="modal" class="hidden"><div class="box">
  <div class="mh"><h3 id="modalTitle"></h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="mb" id="modalBody"></div>
</div></div>
<div id="toast"></div>

<script src="vendor/leaflet.js"></script>
<script src="vendor/chart.js"></script>
<script src="data/rl_data.js?v=20260616y"></script>
<script src="data/rl_geo.js?v=20260616y"></script>
<script src="data/biz_status.js?v=20260616y"></script>
<script src="app.js?v=20260616y"></script>
</body>
</html>
